{% extends 'base.html' %}
{% block content %}

<body style="background-color: rgb(233, 241, 250);">
    <div class="container mt-5">
        <form action="">
            <div class="mb-3">
                <label for="searchMovie" class="form-label">
                    Search for Movie:
                </label>
                <br>
                <input type="text" class="form-control" name="searchMovie"/>
            </div>
            <button type="submit" class="btn btn-primary">
                Search
            </button>
        </form>
        <p>Searching for {{searchTerm}}</p><br>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for movie in movies %}
            <div v-for="movie in movies" class="col">
                <div class="card">
                    <img src="{{ movie.image.url }}" class="card-img-top" width="200">
                    <div class="card-body">
                        <h5 class="card-title">{{ movie.title}}</h5>
                        <p class="card-text">{{ movie.description}}</p>
                        <p class="card-text">{{ movie.genre}}</p>
                        <p class="card-text">{{ movie.year}}</p>
                        <br>
                        {% if movie.url %}
                            <a href="{{ movie.url }}" class="btn btn-primary"> Movie Link </a>
                        {% endif %}
                </div>
            </div>
        </div>
            {% endfor %}
        <br/>
        <br/>
        <br/>
        <h2>Join our mailing list:</h2>
        <form action="{% url 'signup' %}">
            <div class="mb-3">
                <label for="email" class="form-label">Enter your email:</label>
                <input type="email" class="form-control" name="email">
            </div>
            <button type="submit" class="btn btn-primary">Sign up</button>
        </form>
    </div>
</body>

{% endblock content %}
