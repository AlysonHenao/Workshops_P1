<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Movie Reviews</title>
</head>
<header>
    <h1 class="text-center mt-5">Movie Reviews</h1>
</header>
<body style="background-color: rgb(233, 241, 250);">
    <div class="container mt-5">
        <form action="">
            <div class="mb-3">
                <label for="searchMovie" class="form-label">
                    Search for Movie:
                </label>
                <br>
                <input type="text" class="form-control" name="searchMovie"/>
            </div>
            <button type="submit" class="btn btn-primary">
                Search
            </button>
        </form>
        <p>Searching for {{searchTerm}}</p><br>
            {% for movie in movies %}
                <div class="card mb-5 p-4 w-50 mx-auto">
                    <h2>{{ movie.title}}</h2>
                    <p>{{ movie.description}}</p>
                    <img src="{{ movie.image.url }}" width="300">
                    <br>
                    {% if movie.url %}
                        <a href="{{ movie.url }}"> Movie Link </a>
                    {% endif %}
                </div>
            {% endfor %}
        <br/>
    </div>
</body>
</html>
